    function loadScript(url) {
      return new Promise(function(resolve, reject) {
        var s = document.createElement('script');
        s.src = url;
        s.crossOrigin = 'anonymous';
        s.onload = resolve;
        s.onerror = function() { reject(new Error('Échec chargement: ' + url)); };

      LIBS.reduce(function(chain, url) {
        return chain.then(function() { return loadScript(url); });

      .then(function() {

        var appScript = document.getElementById('app-jsx');

            var code = Babel.transform(appScript.textContent, { presets: ['env', 'react'] }).code;

// ── SOUND SYSTEM ──
const SFX = {
  _ctx: null,
  _getCtx() { if (!this._ctx) this._ctx = new (window.AudioContext || window.webkitAudioContext)(); return this._ctx; },
  _play(freq, dur, type = "sine", vol = 0.3) {
    try {
      const ctx = this._getCtx(); const osc = ctx.createOscillator(); const g = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination); osc.frequency.value = freq; osc.type = type;
      g.gain.setValueAtTime(vol, ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
      osc.start(); osc.stop(ctx.currentTime + dur);
    } catch {}
  },
  setDone() {
    this._play(660, 0.08); setTimeout(() => this._play(880, 0.12), 60);
    try { navigator.vibrate?.([30]); } catch {}
  },
  setUndo() { this._play(440, 0.06, "triangle", 0.15); },
  timerEnd() {
    [0, 150, 300].forEach(d => setTimeout(() => this._play(880, 0.18, "sine", 0.4), d));
    [450, 550].forEach(d => setTimeout(() => this._play(1100, 0.12, "sine", 0.35), d));
    try { navigator.vibrate?.([100, 80, 100, 80, 200]); } catch {}
  },
  hiitWork() { this._play(1000, 0.15); setTimeout(() => this._play(1200, 0.2), 100); try { navigator.vibrate?.([200]); } catch {} },
  hiitRest() { this._play(600, 0.12, "triangle", 0.2); setTimeout(() => this._play(500, 0.15, "triangle", 0.2), 100); },
  hiitDone() {
    [0, 100, 200, 300].forEach((d, i) => setTimeout(() => this._play(660 + i * 110, 0.15), d));
    try { navigator.vibrate?.([100, 50, 100, 50, 300]); } catch {}
  },
  click() { this._play(500, 0.03, "sine", 0.1); },
};

}

}

// ── STREAK CALENDAR COMPONENT ──
function StreakCalendar({ sessionLog, hiitLog }) {
  const today = new Date();
  const days = [];
  for (let i = 27; i >= 0; i--) {
    const d = new Date(today); d.setDate(d.getDate() - i);
    const dayStart = new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
    const dayEnd = dayStart + 86400000;
    const hadSession = sessionLog.some(s => s.ts >= dayStart && s.ts < dayEnd);
    const hadHiit = hiitLog.some(h => h.ts >= dayStart && h.ts < dayEnd);
    const isToday = i === 0;
    days.push({ date: d, hadSession, hadHiit, isToday });
  }
  const currentStreak = (() => {
    let streak = 0;
    for (let i = 0; i < days.length; i++) {
      const d = days[days.length - 1 - i];
      if (d.hadSession || d.hadHiit) streak++; else if (i > 0) break;
    }
    return streak;
  })();
  const dayLabels = ["L", "M", "M", "J", "V", "S", "D"];
  return (
    <div className="card" style={{ padding: 16, marginBottom: 16 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <div className="section-label" style={{ marginBottom: 0 }}>ACTIVITÉ · 4 SEMAINES</div>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ fontFamily: "'Oswald',sans-serif", fontSize: 22, fontWeight: 700, color: currentStreak > 0 ? C.accent : C.muted }}>{currentStreak}</span>
          <span style={{ fontFamily: "'Share Tech Mono',monospace", fontSize: 8, color: C.muted, letterSpacing: ".1em" }}>JOURS<br/>STREAK</span>
        </div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4 }}>
        {dayLabels.map((l, i) => <div key={i} style={{ textAlign: "center", fontFamily: "'Share Tech Mono',monospace", fontSize: 8, color: C.muted, letterSpacing: ".06em", paddingBottom: 4 }}>{l}</div>)}
        {days.map((d, i) => {
          const bg = d.hadSession && d.hadHiit ? C.accent
            : d.hadSession ? C.blueLight
            : d.hadHiit ? C.red
            : C.faint;
          const border = d.isToday ? C.accent : "transparent";
          return (
            <div key={i} style={{
              aspectRatio: "1", borderRadius: 3, background: bg,
              border: `2px solid ${border}`, opacity: d.hadSession || d.hadHiit ? 1 : 0.4,
              display: "flex", alignItems: "center", justifyContent: "center",
              transition: "all .2s"
            }}>
              {(d.hadSession || d.hadHiit) && <div style={{ width: 4, height: 4, borderRadius: "50%", background: C.bg, opacity: 0.6 }} />}
            </div>
          );
        })}
      </div>
      <div style={{ display: "flex", gap: 14, marginTop: 10, justifyContent: "center" }}>
        {[{ c: C.blueLight, l: "MUSCU" }, { c: C.red, l: "HIIT" }, { c: C.accent, l: "LES DEUX" }].map((legend, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <div style={{ width: 8, height: 8, borderRadius: 2, background: legend.c }} />
            <span style={{ fontFamily: "'Share Tech Mono',monospace", fontSize: 7, color: C.muted, letterSpacing: ".08em" }}>{legend.l}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── HIIT TIMER COMPONENT ──
function HiitTimer({ config, onComplete, onCancel }) {
  const [phase, setPhase] = useState("ready"); // ready, work, rest, done
  const [round, setRound] = useState(0);
  const [timeLeft, setTimeLeft] = useState(3); // 3s countdown to start
  const [totalElapsed, setTotalElapsed] = useState(0);
  const intervalRef = useRef(null);
  const phaseRef = useRef("ready");
  const roundRef = useRef(0);
  const timeRef = useRef(3);

  useEffect(() => {
    phaseRef.current = phase; roundRef.current = round; timeRef.current = timeLeft;
  }, [phase, round, timeLeft]);

  useEffect(() => {
    intervalRef.current = setInterval(() => {
      setTotalElapsed(t => t + 1);
      const t = timeRef.current;
      const p = phaseRef.current;
      const r = roundRef.current;

      if (t <= 1) {
        if (p === "ready") {
          setPhase("work"); setRound(1); setTimeLeft(config.workTime);
          SFX.hiitWork();
        } else if (p === "work") {
          if (r >= config.rounds) {
            setPhase("done"); clearInterval(intervalRef.current); SFX.hiitDone();
          } else {
            setPhase("rest"); setTimeLeft(config.restTime); SFX.hiitRest();
          }
        } else if (p === "rest") {
          setPhase("work"); setRound(r + 1); setTimeLeft(config.workTime); SFX.hiitWork();
        }
      } else {
        setTimeLeft(t - 1);
      }
    }, 1000);
    return () => clearInterval(intervalRef.current);
  }, [config]);

  const fmtTime = (s) => `${Math.floor(s / 60)}:${String(s % 60).padStart(2, "0")}`;
  const phaseLbl = { ready: "DÉPART ?", work: "PLEIN GAZ !", rest: "STAND", done: "ARRIVÉE !" };
  const phaseCol = { ready: C.accent, work: C.red, rest: C.olive, done: C.accent };
  const progress = phase === "ready" ? timeLeft / 3
    : phase === "work" ? timeLeft / config.workTime
    : phase === "rest" ? timeLeft / config.restTime : 0;
  const radius = 64; const circ = 2 * Math.PI * radius;

  if (phase === "done") {
    return (
      <div style={{ position: "fixed", inset: 0, background: `${C.bg}F8`, zIndex: 200, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 32, backdropFilter: "blur(12px)" }}>
        <div style={{ fontSize: 64, marginBottom: 16 }}>🏁</div>
        <div style={{ fontFamily: "'Oswald',sans-serif", fontSize: 36, fontWeight: 700, color: C.accent, letterSpacing: ".06em", marginBottom: 8 }}>HIIT TERMINÉ</div>
        <div style={{ fontFamily: "'Share Tech Mono',monospace", fontSize: 12, color: C.muted, marginBottom: 6 }}>{config.rounds} ROUNDS · {fmtTime(totalElapsed)} TOTAL</div>
        <div style={{ fontFamily: "'Share Tech Mono',monospace", fontSize: 10, color: C.muted, marginBottom: 32 }}>{config.label}</div>
        <button onClick={() => onComplete(totalElapsed)} style={{ background: C.accent, color: C.bg, border: "none", borderRadius: 3, padding: "16px 48px", fontFamily: "'Oswald',sans-serif", fontSize: 16, fontWeight: 700, letterSpacing: ".1em", cursor: "pointer", borderBottom: `3px solid ${C.accentDim}` }}>VALIDER ✓</button>
      </div>
    );
  }

  return (
    <div style={{ position: "fixed", inset: 0, background: C.bg, zIndex: 200, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 32 }}>
      {/* Phase label */}
      <div style={{ fontFamily: "'Share Tech Mono',monospace", fontSize: 10, color: phaseCol[phase], letterSpacing: ".2em", marginBottom: 8 }}>
        {phase !== "ready" && `ROUND ${round}/${config.rounds} · `}{phaseLbl[phase]}
      </div>

      {/* Circular timer */}
      <div style={{ position: "relative", width: 200, height: 200, marginBottom: 24 }}>
        <svg width="200" height="200" viewBox="0 0 200 200">
          <circle cx="100" cy="100" r={radius} fill="none" stroke={C.faint} strokeWidth="6" />
          <circle cx="100" cy="100" r={radius} fill="none" stroke={phaseCol[phase]} strokeWidth="6"
            strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={circ * (1 - progress)}
            transform="rotate(-90 100 100)" style={{ transition: "stroke-dashoffset 1s linear, stroke .3s" }} />
          <circle cx="100" cy="100" r="52" fill={`${phaseCol[phase]}12`} />
        </svg>
        <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
          <div style={{ fontFamily: "'Oswald',sans-serif", fontSize: 56, fontWeight: 700, color: phaseCol[phase], lineHeight: 1, fontVariantNumeric: "tabular-nums" }}>{fmtTime(timeLeft)}</div>
          <div style={{ fontFamily: "'Share Tech Mono',monospace", fontSize: 10, color: C.muted, marginTop: 4 }}>{fmtTime(totalElapsed)} TOTAL</div>
        </div>
      </div>

      {/* Round indicators */}
      <div style={{ display: "flex", gap: 6, marginBottom: 32, flexWrap: "wrap", justifyContent: "center" }}>
        {Array.from({ length: config.rounds }, (_, i) => (
          <div key={i} style={{
            width: 12, height: 12, borderRadius: 2,
            background: i + 1 < round ? C.accent : i + 1 === round ? phaseCol[phase] : C.faint,
            border: `1px solid ${i + 1 === round ? phaseCol[phase] : C.border}`,
            transition: "all .3s",
            transform: i + 1 === round ? "scale(1.3)" : "scale(1)"
          }} />
        ))}
      </div>

      {/* Config info */}
      <div style={{ fontFamily: "'Share Tech Mono',monospace", fontSize: 10, color: C.muted, textAlign: "center", lineHeight: 1.8, marginBottom: 24 }}>
        {config.workTime}s EFFORT / {config.restTime}s RÉCUP · {config.label}
      </div>

      <button onClick={() => { clearInterval(intervalRef.current); onCancel(); }}
        style={{ background: "transparent", border: `1px solid ${C.border}`, borderRadius: 3, padding: "12px 32px", fontFamily: "'Share Tech Mono',monospace", fontSize: 11, color: C.muted, cursor: "pointer", letterSpacing: ".1em" }}>
        ✕ ANNULER
      </button>
    </div>
  );
}

// ── PR DETECTION SYSTEM ──
function detectPRs(charges) {
  const prs = [];
  Object.entries(charges).forEach(([name, entries]) => {
    if (!entries?.length) return;
    const kgs = entries.map(e => parseFloat(e.kg)).filter(n => !isNaN(n));
    if (!kgs.length) return;
    const best = Math.max(...kgs);
    const latest = parseFloat(entries[0].kg);
    if (!isNaN(latest) && latest === best && entries.length > 1) {
      const prev = kgs.slice(1);
      const prevBest = prev.length ? Math.max(...prev) : 0;
      if (latest > prevBest) prs.push({ name, kg: latest, prevBest, date: entries[0].date, ts: entries[0].ts });
    }
  });
  return prs.sort((a, b) => b.ts - a.ts);
}

function PRBadges({ charges }) {
  const prs = detectPRs(charges);
  if (!prs.length) return null;
  return (
    <div className="card" style={{ padding: 16, marginBottom: 16, borderLeft: `4px solid ${C.accent}` }}>

        {prs.slice(0, 5).map((pr, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 10px", background: `${C.accent}0C`, borderRadius: 3, border: `1px solid ${C.accent}22` }}>
            <div style={{ width: 32, height: 32, borderRadius: 4, background: C.accent, color: C.bg, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'Oswald',sans-serif", fontSize: 14, fontWeight: 700, flexShrink: 0 }}>REC</div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontFamily: "'Share Tech Mono',monospace", fontSize: 10, color: C.text, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{pr.name}</div>
              <div style={{ fontFamily: "'Share Tech Mono',monospace", fontSize: 8, color: C.muted }}>{pr.date} · Ancien: {pr.prevBest}kg</div>
            </div>
            <div style={{ textAlign: "right", flexShrink: 0 }}>
              <div className="military-header" style={{ fontSize: 18, color: C.accent, lineHeight: 1 }}>{pr.kg}KG</div>

// ── BODY FAT % NAVY FORMULA ──
function BodyFatCalc() {
  const [form, setForm] = useState({ waist: "", neck: "", height: "181" });
  const [result, setResult] = useState(null);

  const calculate = () => {
    const w = parseFloat(form.waist);
    const n = parseFloat(form.neck);
    const h = parseFloat(form.height);
    if (!w || !n || !h || w <= n) return;
    // Navy formula (men): 495 / (1.0324 - 0.19077 * log10(waist - neck) + 0.15456 * log10(height)) - 450
    const bf = 495 / (1.0324 - 0.19077 * Math.log10(w - n) + 0.15456 * Math.log10(h)) - 450;
    setResult(Math.max(3, Math.min(45, Math.round(bf * 10) / 10)));
  };

  const getCategory = (bf) => {
    if (bf < 8) return { label: "ESSENTIEL", color: C.red };
    if (bf < 13) return { label: "ATHLÉTIQUE", color: C.accent };
    if (bf < 18) return { label: "FITNESS", color: C.olive };
    if (bf < 25) return { label: "MOYEN", color: C.blueLight };
    return { label: "AU-DESSUS", color: C.red };
  };

  return (
    <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 4, padding: 14, marginBottom: 16 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
        <span style={{ fontSize: 18 }}>📐</span>
        <div>
          <div className="military-header" style={{ fontSize: 13, color: C.blueLight }}>BODY FAT % · FORMULE NAVY</div>
          <div style={{ fontFamily: "'Share Tech Mono',monospace", fontSize: 8, color: C.muted }}>ESTIMATION BASÉE SUR LES MENSURATIONS</div>
        </div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 10 }}>
        {[
          { key: "waist", lbl: "TAILLE (CM)", ph: "ex: 82" },
          { key: "neck", lbl: "COU (CM)", ph: "ex: 38" },
          { key: "height", lbl: "TAILLE (CM)", ph: "181" },
        ].map(f => (
          <div key={f.key}>
            <div style={{ fontFamily: "'Share Tech Mono',monospace", fontSize: 7, color: C.muted, letterSpacing: ".1em", marginBottom: 4 }}>{f.lbl}</div>
            <input type="number" step="0.5" placeholder={f.ph} value={form[f.key]}
              onChange={e => setForm(p => ({ ...p, [f.key]: e.target.value }))}
              style={{ padding: "8px 8px", fontSize: 16, fontWeight: "bold", color: C.blueLight }} />
          </div>
        ))}
      </div>
      <button onClick={calculate} style={{
        width: "100%", padding: "10px", borderRadius: 2, border: "none",
        background: C.blueLight, color: C.bg, fontFamily: "'Share Tech Mono',monospace",
        fontSize: 11, letterSpacing: ".1em", cursor: "pointer", fontWeight: "bold",
        borderBottom: `2px solid ${C.blue}`
      }}>CALCULER</button>
      {result !== null && (() => {
        const cat = getCategory(result);
        return (
          <div style={{ marginTop: 12, display: "flex", alignItems: "center", gap: 14, padding: "12px", background: `${cat.color}0C`, borderRadius: 3, border: `1px solid ${cat.color}22` }}>
            <div style={{ textAlign: "center" }}>
              <div className="military-header" style={{ fontSize: 32, color: cat.color, lineHeight: 1 }}>{result}%</div>
              <div style={{ fontFamily: "'Share Tech Mono',monospace", fontSize: 8, color: cat.color, marginTop: 4, letterSpacing: ".1em" }}>{cat.label}</div>
            </div>
            <div style={{ flex: 1, fontFamily: "'Share Tech Mono',monospace", fontSize: 9, color: C.muted, lineHeight: 1.7 }}>
              Masse grasse estimée. Objectif : viser 12-15% pour une définition musculaire visible.
            </div>
          </div>
        );
      })()}
    </div>
  );
}

// ── REGULARITY SCORE ──
function RegularityScore({ sessionLog, hiitLog, target = { sessions: 4, hiit: 2 } }) {
  const weekAgo = Date.now() - 7 * 86400000;
  const sessionsThisWeek = sessionLog.filter(s => s.ts > weekAgo).length;
  const hiitsThisWeek = hiitLog.filter(h => h.ts > weekAgo).length;
  const sessionPct = Math.min(100, Math.round((sessionsThisWeek / target.sessions) * 100));
  const hiitPct = Math.min(100, Math.round((hiitsThisWeek / target.hiit) * 100));
  const totalPct = Math.round((sessionPct + hiitPct) / 2);

  const getGrade = (pct) => {
    if (pct >= 90) return { letter: "A", color: C.accent, label: "EXEMPLAIRE" };
    if (pct >= 70) return { letter: "B", color: C.olive, label: "SOLIDE" };
    if (pct >= 50) return { letter: "C", color: C.sand, label: "PEUT MIEUX FAIRE" };
    return { letter: "D", color: C.red, label: "ALERTE" };

  const grade = getGrade(totalPct);

  return (
    <div className="card" style={{ padding: 16, marginBottom: 16 }}>
      <div className="section-label" style={{ marginBottom: 10 }}>SCORE DE RÉGULARITÉ</div>

          <div style={{ fontFamily: "'Share Tech Mono',monospace", fontSize: 8, color: grade.color, letterSpacing: ".12em", marginBottom: 8 }}>{grade.label}</div>

// ── OFFLINE / SYNC INDICATOR ──
function SyncIndicator() {
  const [online, setOnline] = useState(typeof navigator !== "undefined" ? navigator.onLine : true);
  const [lastSaved, setLastSaved] = useState(null);
  const [showBadge, setShowBadge] = useState(false);

  useEffect(() => {
    const on = () => { setOnline(true); setShowBadge(true); setTimeout(() => setShowBadge(false), 3000); };
    const off = () => { setOnline(false); setShowBadge(true); };
    window.addEventListener("online", on);
    window.addEventListener("offline", off);
    // Listen for storage saves via custom event
    const onSave = () => { setLastSaved(Date.now()); setShowBadge(true); setTimeout(() => setShowBadge(false), 2000); };
    window.addEventListener("chc-saved", onSave);
    return () => { window.removeEventListener("online", on); window.removeEventListener("offline", off); window.removeEventListener("chc-saved", onSave); };
  }, []);

  if (!showBadge && online) return null;

  return (
    <div style={{
      position: "fixed", top: 12, right: 12, zIndex: 150,
      display: "flex", alignItems: "center", gap: 6,
      padding: "6px 12px", borderRadius: 20,
      background: online ? `${C.surface}F0` : `${C.red}18`,
      border: `1px solid ${online ? C.border : C.red}55`,
      backdropFilter: "blur(12px)",
      animation: "fadeUp .3s ease forwards",
      fontFamily: "'Share Tech Mono',monospace"
    }}>
      <div style={{ width: 6, height: 6, borderRadius: "50%", background: online ? "#4a7c4e" : C.red, animation: "pulse 2s infinite" }} />
      <span style={{ fontSize: 8, color: online ? C.muted : C.red, letterSpacing: ".1em" }}>
        {online ? (lastSaved ? "SYNCHRONISÉ" : "EN LIGNE") : "HORS LIGNE"}
      </span>
    </div>
  );
}

// ── WEEKLY SUMMARY CARD ──
function WeeklySummary({ sessionLog, hiitLog, charges, weights }) {
  const weekAgo = Date.now() - 7 * 86400000;
  const sessions = sessionLog.filter(s => s.ts > weekAgo);
  const hiits = hiitLog.filter(h => h.ts > weekAgo);

  // Total volume this week
  let totalVolume = 0;
  Object.values(charges).forEach(entries => {
    entries.forEach(e => {
      if (e.ts < weekAgo) return;
      const kg = parseFloat(e.kg); const reps = parseInt(e.reps) || 10; const sets = parseInt(e.sets) || 3;
      if (!isNaN(kg)) totalVolume += kg * reps * sets;
    });
  });

  // Weight trend
  const recentWeights = weights.filter(w => w.ts > weekAgo);
  const weightDelta = recentWeights.length >= 2
    ? (recentWeights[0].kg - recentWeights[recentWeights.length - 1].kg).toFixed(1) : null;

  // PRs this week
  const weekPRs = [];
  Object.entries(charges).forEach(([name, entries]) => {
    const thisWeek = entries.filter(e => e.ts > weekAgo);
    const older = entries.filter(e => e.ts <= weekAgo);
    if (!thisWeek.length || !older.length) return;
    const weekMax = Math.max(...thisWeek.map(e => parseFloat(e.kg) || 0));
    const oldMax = Math.max(...older.map(e => parseFloat(e.kg) || 0));
    if (weekMax > oldMax) weekPRs.push({ name, kg: weekMax, delta: +(weekMax - oldMax).toFixed(1) });
  });

  if (!sessions.length && !hiits.length) return null;

  return (
    <div className="card" style={{ padding: 16, marginBottom: 16, background: `linear-gradient(135deg, ${C.card}, ${C.accent}08)`, borderLeft: `4px solid ${C.accent}` }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <div className="section-label" style={{ marginBottom: 0 }}>📋 BILAN DE LA SEMAINE</div>
        <div style={{ fontFamily: "'Share Tech Mono',monospace", fontSize: 8, color: C.muted }}>
          {new Date(weekAgo).toLocaleDateString("fr-FR", { day: "numeric", month: "short" })} → AUJOURD'HUI
        </div>
      </div>
      {/* Stats grid */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 8, marginBottom: 12 }}>
        {[
          { lbl: "SÉANCES", val: sessions.length, unit: `/${4}`, col: C.blueLight },
          { lbl: "HIIT", val: hiits.length, unit: `/${2}`, col: C.red },
          { lbl: "VOLUME", val: totalVolume > 1000 ? `${(totalVolume / 1000).toFixed(1)}t` : `${totalVolume}kg`, unit: "", col: C.accent },
        ].map((s, i) => (
          <div key={i} style={{ textAlign: "center", padding: "8px 4px", background: `${s.col}0C`, borderRadius: 3, border: `1px solid ${s.col}22` }}>
            <div className="military-header" style={{ fontSize: 20, color: s.col, lineHeight: 1 }}>{s.val}<span style={{ fontSize: 11, color: C.muted }}>{s.unit}</span></div>
            <div style={{ fontFamily: "'Share Tech Mono',monospace", fontSize: 7, color: C.muted, marginTop: 3, letterSpacing: ".1em" }}>{s.lbl}</div>
          </div>
        ))}
      </div>
      {/* Weight + PRs */}
      <div style={{ display: "flex", gap: 8 }}>
        {weightDelta !== null && (
          <div style={{ flex: 1, padding: "8px 10px", background: C.faint, borderRadius: 3, border: `1px solid ${C.border}` }}>
            <div style={{ fontFamily: "'Share Tech Mono',monospace", fontSize: 8, color: C.muted, letterSpacing: ".1em", marginBottom: 3 }}>POIDS</div>
            <div className="military-header" style={{ fontSize: 16, color: parseFloat(weightDelta) <= 0 ? C.olive : C.sand }}>
              {parseFloat(weightDelta) > 0 ? "+" : ""}{weightDelta}KG
            </div>
          </div>
        )}
        {weekPRs.length > 0 && (
          <div style={{ flex: 1, padding: "8px 10px", background: `${C.accent}0C`, borderRadius: 3, border: `1px solid ${C.accent}22` }}>
            <div style={{ fontFamily: "'Share Tech Mono',monospace", fontSize: 8, color: C.accent, letterSpacing: ".1em", marginBottom: 3 }}>🏆 {weekPRs.length} RECORD{weekPRs.length > 1 ? "S" : ""}</div>
            <div style={{ fontFamily: "'Share Tech Mono',monospace", fontSize: 9, color: C.muted }}>
              {weekPRs.slice(0, 2).map(p => `${p.name.split(" ").slice(0, 2).join(" ")} +${p.delta}kg`).join(" · ")}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── MUSCLE HEATMAP ──
function MuscleHeatmap({ charges }) {
  // Calculate volume by muscle group from last 7 days
  const weekAgo = Date.now() - 7 * 86400000;
  const muscleVol = {};
  Object.entries(charges).forEach(([name, entries]) => {
    entries.forEach(e => {
      if (e.ts < weekAgo) return;
      const kg = parseFloat(e.kg); const reps = parseInt(e.reps) || 10; const sets = parseInt(e.sets) || 3;
      if (isNaN(kg)) return;
      const vol = kg * reps * sets;
      // Map exercise name to muscle group
      const n = name.toLowerCase();
      if (n.includes("couché") || n.includes("incliné") || n.includes("décliné") || n.includes("pull-over") || n.includes("dips") || n.includes("écarté") || n.includes("flyes") || n.includes("floor press") || n.includes("pompes")) {
        muscleVol["chest"] = (muscleVol["chest"] || 0) + vol;
      }
      if (n.includes("rowing") || n.includes("traction") || n.includes("chin") || n.includes("pendlay") || n.includes("meadows") || n.includes("pull-up") || n.includes("archer")) {
        muscleVol["back"] = (muscleVol["back"] || 0) + vol;
      }
      if (n.includes("militaire") || n.includes("arnold") || n.includes("latéral") || n.includes("oiseau") || n.includes("face pull") || n.includes("front raise") || n.includes("lu raise") || n.includes("upright") || n.includes("pike push")) {
        muscleVol["shoulders"] = (muscleVol["shoulders"] || 0) + vol;
      }
      if (n.includes("curl") || n.includes("zottman") || n.includes("spider") || n.includes("21s")) {
        muscleVol["biceps"] = (muscleVol["biceps"] || 0) + vol;
      }
      if (n.includes("triceps") || n.includes("skullcrusher") || n.includes("extension") || n.includes("french press") || n.includes("kickback") || n.includes("close grip") || n.includes("diamant")) {
        muscleVol["triceps"] = (muscleVol["triceps"] || 0) + vol;
      }
      if (n.includes("shrug") || n.includes("farmer")) {
        muscleVol["traps"] = (muscleVol["traps"] || 0) + vol;
      }
      if (n.includes("abdo") || n.includes("crunch") || n.includes("gainage") || n.includes("planche") || n.includes("hollow") || n.includes("dragon") || n.includes("bicycle") || n.includes("russian") || n.includes("wheel") || n.includes("toes") || n.includes("relevé") || n.includes("windshield") || n.includes("pallof") || n.includes("farmer")) {
        muscleVol["core"] = (muscleVol["core"] || 0) + vol;
      }
    });
  });

  const maxVol = Math.max(...Object.values(muscleVol), 1);
  const intensity = (group) => {
    const v = muscleVol[group] || 0;
    return Math.min(1, v / maxVol);
  };
  const color = (group) => {
    const i = intensity(group);
    if (i === 0) return C.faint;
    if (i < 0.3) return `${C.blueLight}55`;
    if (i < 0.6) return `${C.olive}88`;
    if (i < 0.85) return `${C.accent}AA`;
    return `${C.red}CC`;
  };

  const hasData = Object.keys(muscleVol).length > 0;

  return (
    <div className="card" style={{ padding: 18, marginBottom: 16 }}>

// ── DUAL AXIS CHART (Weight vs Lifts) ──
function DualAxisChart({ weights, charges }) {
  // Build combined data: for each weight entry date, find the best lift around that time
  const benchKey = "Développé couché barre";
  const data = [];
  const sorted = [...weights].sort((a, b) => a.ts - b.ts).slice(-12);
  sorted.forEach(w => {
    const point = { date: w.date, poids: w.kg };
    // Find bench closest to this date
    const benchEntries = charges[benchKey] || [];
    const closest = benchEntries.reduce((best, e) => {
      if (!best || Math.abs(e.ts - w.ts) < Math.abs(best.ts - w.ts)) return e;
      return best;
    }, null);
    point.bench = closest ? parseFloat(closest.kg) || 0 : 0;
    data.push(point);
  });

  if (data.length < 2 || data.every(d => d.bench === 0)) return null;

  return (
    <div className="card" style={{ padding: 18, marginBottom: 16 }}>
      <div className="section-label">POIDS CORPS vs BENCH PRESS</div>
      <div style={{ fontFamily: "'Share Tech Mono',monospace", fontSize: 9, color: C.muted, marginBottom: 12 }}>
        Corrélation entre ta masse et ta force. L'objectif : bench ↑ poids →
      </div>
      <ResponsiveContainer width="100%" height={170}>
        <LineChart data={data}>
          <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
          <XAxis dataKey="date" tick={{ fill: C.muted, fontSize: 9, fontFamily: "'Share Tech Mono'" }} axisLine={false} tickLine={false} />
          <YAxis yAxisId="left" tick={{ fill: C.accent, fontSize: 9, fontFamily: "'Share Tech Mono'" }} axisLine={false} tickLine={false} domain={["auto", "auto"]} />
          <YAxis yAxisId="right" orientation="right" tick={{ fill: C.blueLight, fontSize: 9, fontFamily: "'Share Tech Mono'" }} axisLine={false} tickLine={false} domain={["auto", "auto"]} />
          <Tooltip contentStyle={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 2, fontFamily: "'Share Tech Mono'", fontSize: 10 }}
            formatter={(v, name) => [`${v}${name === "poids" ? "kg" : "kg"}`, name === "poids" ? "Poids corps" : "Bench"]} />
          <Line yAxisId="left" type="monotone" dataKey="poids" stroke={C.accent} strokeWidth={2} dot={{ fill: C.accent, r: 3 }} strokeDasharray="5 3" />
          <Line yAxisId="right" type="monotone" dataKey="bench" stroke={C.blueLight} strokeWidth={2.5} dot={{ fill: C.blueLight, r: 3 }} />
        </LineChart>
      </ResponsiveContainer>
      <div style={{ display: "flex", gap: 16, justifyContent: "center", marginTop: 8 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <div style={{ width: 16, height: 2, background: C.accent, borderRadius: 1 }} />
          <span style={{ fontFamily: "'Share Tech Mono',monospace", fontSize: 8, color: C.muted }}>POIDS CORPS</span>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <div style={{ width: 16, height: 2, background: C.blueLight, borderRadius: 1 }} />
          <span style={{ fontFamily: "'Share Tech Mono',monospace", fontSize: 8, color: C.muted }}>BENCH PRESS</span>
        </div>
      </div>
    </div>
  );
}

// ── DAILY JOURNAL ──
function DailyJournal({ journal, setJournal }) {
  const todayStr = new Date().toLocaleDateString("fr-FR", { day: "numeric", month: "short" });
  const todayEntry = journal.find(j => j.date === todayStr);
  const [expanded, setExpanded] = useState(false);
  const [form, setForm] = useState({
    sleep: todayEntry?.sleep || 0,
    energy: todayEntry?.energy || 0,
    pain: todayEntry?.pain || "",
    note: todayEntry?.note || "",
  });
  const [saved, setSaved] = useState(false);

  const handleSave = () => {
    if (!form.sleep && !form.energy && !form.note && !form.pain) return;
    const entry = { ts: Date.now(), date: todayStr, ...form };
    // Replace today's entry or add new
    setJournal(prev => {
      const filtered = prev.filter(j => j.date !== todayStr);
      return [entry, ...filtered].slice(0, 60);
    });
    setSaved(true); SFX.setDone();
    setTimeout(() => { setSaved(false); setExpanded(false); }, 1200);
  };

  const sleepLabels = ["", "😴 <5h", "😐 5-6h", "🙂 6-7h", "😊 7-8h", "💪 8h+"];
  const energyLabels = ["", "🪫 Épuisé", "😑 Faible", "🙂 Normal", "⚡ Bien", "🔥 Pleine forme"];

  return (
    <div className="card" style={{ padding: 14, marginBottom: 16 }}>
      <div onClick={() => setExpanded(!expanded)} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 16 }}>📓</span>
          <div>
            <div className="section-label" style={{ marginBottom: 0, fontSize: 9 }}>JOURNAL DU JOUR</div>
            {todayEntry ? (
              <div style={{ fontFamily: "'Share Tech Mono',monospace", fontSize: 9, color: C.muted, marginTop: 2 }}>
                {sleepLabels[todayEntry.sleep] || ""} {energyLabels[todayEntry.energy] || ""} {todayEntry.pain ? `· ${todayEntry.pain}` : ""}
              </div>
            ) : (
              <div style={{ fontFamily: "'Share Tech Mono',monospace", fontSize: 9, color: C.accent, marginTop: 2 }}>Pas encore rempli</div>
            )}
          </div>
        </div>
        <span style={{ fontFamily: "'Share Tech Mono',monospace", fontSize: 9, color: C.muted }}>{expanded ? "▴" : "▾"}</span>
      </div>

      {expanded && (
        <div style={{ marginTop: 12, animation: "fadeUp .2s ease forwards" }}>
          {/* Sleep */}
          <div style={{ marginBottom: 10 }}>
            <div style={{ fontFamily: "'Share Tech Mono',monospace", fontSize: 8, color: C.muted, letterSpacing: ".1em", marginBottom: 5 }}>SOMMEIL</div>
            <div style={{ display: "flex", gap: 4 }}>
              {[1,2,3,4,5].map(v => (
                <button key={v} onClick={() => setForm(f => ({ ...f, sleep: v }))}
                  style={{ flex: 1, padding: "6px 2px", borderRadius: 2, border: `1px solid ${form.sleep === v ? C.blueLight : C.border}`, background: form.sleep === v ? `${C.blueLight}22` : C.faint, color: form.sleep === v ? C.blueLight : C.muted, fontFamily: "'Share Tech Mono',monospace", fontSize: 8, cursor: "pointer", transition: "all .15s", textAlign: "center" }}>
                  {sleepLabels[v]}
                </button>
              ))}
            </div>
          </div>

          {/* Energy */}
          <div style={{ marginBottom: 10 }}>
            <div style={{ fontFamily: "'Share Tech Mono',monospace", fontSize: 8, color: C.muted, letterSpacing: ".1em", marginBottom: 5 }}>ÉNERGIE</div>
            <div style={{ display: "flex", gap: 4 }}>
              {[1,2,3,4,5].map(v => (
                <button key={v} onClick={() => setForm(f => ({ ...f, energy: v }))}
                  style={{ flex: 1, padding: "6px 2px", borderRadius: 2, border: `1px solid ${form.energy === v ? C.accent : C.border}`, background: form.energy === v ? `${C.accent}22` : C.faint, color: form.energy === v ? C.accent : C.muted, fontFamily: "'Share Tech Mono',monospace", fontSize: 8, cursor: "pointer", transition: "all .15s", textAlign: "center" }}>
                  {energyLabels[v]}
                </button>
              ))}
            </div>
          </div>

          {/* Pain / Notes */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 10 }}>
            <div>
              <div style={{ fontFamily: "'Share Tech Mono',monospace", fontSize: 8, color: C.muted, letterSpacing: ".1em", marginBottom: 5 }}>DOULEURS / GÊNE</div>
              <input placeholder="ex: épaule droite" value={form.pain}
                onChange={e => setForm(f => ({ ...f, pain: e.target.value }))} style={{ padding: "8px 10px" }} />
            </div>
            <div>
              <div style={{ fontFamily: "'Share Tech Mono',monospace", fontSize: 8, color: C.muted, letterSpacing: ".1em", marginBottom: 5 }}>NOTE LIBRE</div>

// ── EXERCISE GOAL BADGE ──
function ExerciseGoalBadge({ name, charges, goal }) {
  if (!goal?.target) return null;
  const entries = charges[name] || [];
  const kgs = entries.map(e => parseFloat(e.kg)).filter(n => !isNaN(n));
  const current = kgs.length ? Math.max(...kgs) : 0;
  const pct = Math.min(100, Math.round((current / goal.target) * 100));
  const reached = current >= goal.target;

  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 10px", background: reached ? `${C.accent}12` : C.faint, borderRadius: 3, border: `1px solid ${reached ? C.accent : C.border}`, marginTop: 6 }}>
      <span style={{ fontSize: 12 }}>{reached ? "🏆" : "🎯"}</span>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
          <span style={{ fontFamily: "'Share Tech Mono',monospace", fontSize: 8, color: reached ? C.accent : C.muted, letterSpacing: ".08em" }}>
            {reached ? "OBJECTIF ATTEINT !" : `OBJECTIF : ${goal.target}KG`}
          </span>
          <span style={{ fontFamily: "'Share Tech Mono',monospace", fontSize: 8, color: reached ? C.accent : C.muted }}>{current}/{goal.target}KG</span>
        </div>
        <div style={{ height: 3, background: C.faint, borderRadius: 2, overflow: "hidden" }}>
          <div style={{ height: "100%", width: `${pct}%`, background: reached ? C.accent : C.blueLight, borderRadius: 2, transition: "width .5s" }} />
        </div>
      </div>
    </div>
  );
}

// ── EXERCISE GOAL SETTER (inline) ──
function GoalSetter({ name, exerciseGoals, setExerciseGoals }) {
  const [editing, setEditing] = useState(false);
  const [val, setVal] = useState(exerciseGoals[name]?.target || "");
  const current = exerciseGoals[name];

  const save = () => {
    const num = parseFloat(val);
    if (num > 0) {
      setExerciseGoals(prev => ({ ...prev, [name]: { target: num, unit: "kg" } }));
      SFX.click();
    } else {
      // Remove goal
      setExerciseGoals(prev => { const n = { ...prev }; delete n[name]; return n; });
    }
    setEditing(false);
  };

  if (!editing && !current) {
    return (
      <button onClick={() => setEditing(true)} style={{ marginTop: 6, padding: "5px 10px", borderRadius: 2, border: `1px dashed ${C.border}`, background: "transparent", color: C.muted, fontFamily: "'Share Tech Mono',monospace", fontSize: 8, cursor: "pointer", letterSpacing: ".08em", transition: "all .15s" }}>
        🎯 DÉFINIR UN OBJECTIF
      </button>
    );
  }

  if (editing) {
    return (
      <div style={{ display: "flex", gap: 6, marginTop: 6, animation: "fadeUp .2s ease forwards" }}>
        <input type="number" step="0.5" placeholder="ex: 100" value={val}
          onChange={e => setVal(e.target.value)}
          style={{ flex: 1, padding: "6px 10px", fontSize: 16 }} />
        <button onClick={save} style={{ padding: "6px 14px", borderRadius: 2, border: "none", background: C.accent, color: C.bg, fontFamily: "'Share Tech Mono',monospace", fontSize: 9, fontWeight: "bold", cursor: "pointer" }}>OK</button>
        <button onClick={() => setEditing(false)} style={{ padding: "6px 10px", borderRadius: 2, border: `1px solid ${C.border}`, background: "transparent", color: C.muted, fontFamily: "'Share Tech Mono',monospace", fontSize: 9, cursor: "pointer" }}>✕</button>
      </div>
    );
  }

  return (
    <div onClick={() => setEditing(true)} style={{ cursor: "pointer" }}>
      <ExerciseGoalBadge name={name} charges={{}} goal={current} />
    </div>
  );
}

// Calcule la session du jour selon le jour de semaine
function getTodaySession() {
  const day = new Date().getDay(); // 0=dim, 1=lun, 2=mar, 3=mer, 4=jeu, 5=ven, 6=sam
  const map = { 1: 0, 2: 1, 4: 2, 6: 3 }; // lun→PushA, mar→PullA, jeu→PushB, sam→PullB
  return map[day] !== undefined ? PROGRAM.sessions[map[day]] : null;
}

function isHiitDay() {
  const day = new Date().getDay();
  return day === 3 || day === 5; // mercredi ou vendredi
}

function getCurrentWeek() {
  const now = new Date();
  const diff = now - START_DATE;
  return Math.max(1, Math.ceil(diff / (7 * 24 * 3600 * 1000)));
}

    setWeights(prev => {
      const next = [
        { date: new Date().toLocaleDateString("fr-FR", { day: "numeric", month: "short" }), kg, ts: Date.now() },
        ...prev
      ].slice(0, 16);
      return next;
    });
  };

  const logHiit = (entry) => {
    setHiitLog(prev => {
      const next = [entry, ...prev].slice(0, 30);
      return next;
    });
  };

  const logSession = (entry) => {
    setSessionLog(prev => {
      const next = [entry, ...prev].slice(0, 50);
      return next;
    });
  };

  const logMeasurements = (entry) => {
    setMeasurements(prev => {
      const next = [entry, ...prev].slice(0, 12);
      return next;
    });
  };

  // Sessions this week
  const weekAgo = Date.now() - 7 * 24 * 3600 * 1000;
  const sessionsThisWeek = sessionLog.filter(s => s.ts > weekAgo).length;

  // ── Calcul dynamique des stats depuis les charges ──
  // Mapping exercice → clé de métrique
  const METRIC_MAP = {
    "Développé couché barre": "bench",
    "Développé haltères à plat": "bench",
    "Développé incliné haltères": "bench",
    "Rowing barre Yates": "row",
    "Rowing haltère 1 bras": "row",
    "Rowing haltères 2 bras": "row",
    "Tractions pronation lestées": "pullup",
    "Tractions prise large": "pullup",
    "Tractions supination (Chin-ups)": "pullup",
    "Tractions chin-ups": "pullup",
    "Développé militaire barre": "ohp",
    "Arnold Press haltères": "ohp",
  };

  // Construit perfData : 1 point par entrée (max 10 dernières)
  const computedPerfData = (() => {
    const byMetric = { bench: [], row: [], pullup: [], ohp: [] };
    Object.entries(charges).forEach(([name, entries]) => {
      const key = METRIC_MAP[name];
      if (!key) return;
      entries.forEach(e => {
        const kg = parseFloat(e.kg);
        if (!isNaN(kg)) byMetric[key].push({ kg, ts: e.ts, date: e.date });
      });
    });
    // Fusionne toutes les entrées, triées par timestamp
    const allTs = new Set();
    Object.values(byMetric).forEach(arr => arr.forEach(e => allTs.add(e.ts)));
    const sorted = [...allTs].sort((a, b) => a - b).slice(-10);
    if (sorted.length === 0) return [{ week: "Départ", bench: 0, row: 0, pullup: 0, ohp: 0 }];
    return sorted.map((ts) => {
      const d = new Date(ts);
      const label = d.toLocaleDateString("fr-FR", { day: "numeric", month: "short" });
      const point = { week: label };
      Object.entries(byMetric).forEach(([key, arr]) => {
        const before = arr.filter(e => e.ts <= ts);
        point[key] = before.length ? Math.max(...before.map(e => e.kg)) : 0;
      });
      return point;
    });
  })();

  // Volume hebdo : somme(kg × reps × sets) par jour de la semaine
  const computedVolumeData = (() => {
    const days = ["Lun", "Mar", "Mer", "Jeu", "Ven", "Sam", "Dim"];
    const vol = { Lun: 0, Mar: 0, Mer: 0, Jeu: 0, Ven: 0, Sam: 0, Dim: 0 };
    const now = Date.now();
    const weekAgo = now - 7 * 24 * 3600 * 1000;
    Object.values(charges).forEach(entries => {
      entries.forEach(e => {
        if (e.ts < weekAgo) return;
        const kg = parseFloat(e.kg);
        const reps = parseInt(e.reps) || 10;
        const sets = parseInt(e.sets) || 3;
        if (isNaN(kg)) return;
        const d = new Date(e.ts);
        const dayName = days[d.getDay() === 0 ? 6 : d.getDay() - 1];
        vol[dayName] = (vol[dayName] || 0) + kg * reps * sets;
      });
    });
    return days.map(day => ({ day, volume: Math.round(vol[day] || 0) }));
  })();

  // Radar : max charge par groupe musculaire normalisé
  const computedRadarData = (() => {
    const groups = {
      "Pectoraux": ["Développé couché barre", "Développé incliné haltères", "Développé haltères à plat", "Développé décliné haltères"],
      "Dos": ["Rowing barre Yates", "Rowing haltère 1 bras", "Rowing haltères 2 bras", "Tractions pronation lestées", "Tractions prise large"],
      "Épaules": ["Développé militaire barre", "Arnold Press haltères", "Élévations latérales haltères"],
      "Biceps": ["Curl barre", "Curl marteau haltères", "Curl incliné haltères", "Curl concentré haltère"],
      "Triceps": ["Extension triceps couché (Skullcrusher)", "Dips banc lestés", "Extension triceps 1 bras haltère"],
      "Trapèzes": ["Shrugs barre", "Face pull haltères", "Oiseau haltères (Rear delt fly)"],
    };
    const vals = Object.entries(groups).map(([subject, exs]) => {
      const maxes = exs.map(name => {
        const h = charges[name];
        if (!h?.length) return 0;
        return Math.max(...h.map(e => parseFloat(e.kg) || 0));
      });
      return { subject, A: Math.max(...maxes) };
    });
    const maxAll = Math.max(...vals.map(v => v.A), 1);
    return vals.map(v => ({ subject: v.subject, A: Math.round((v.A / maxAll) * 100) }));
  })();

  return (
    <div style={{ fontFamily: "'Share Tech Mono','Courier New',monospace", background: C.bg, color: C.text, minHeight: "100vh", maxWidth: 430, margin: "0 auto", position: "relative",
      // CSS variables — se mettent à jour instantanément au toggle, pas besoin de remonter le style tag
      '--c-bg': C.bg, '--c-surface': C.surface, '--c-card': C.card, '--c-border': C.border,
      '--c-accent': C.accent, '--c-accent-dim': C.accentDim, '--c-muted': C.muted,
      '--c-faint': C.faint, '--c-text': C.text, '--c-sand': C.sand,
    }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}
        ::-webkit-scrollbar{display:none}

        /* ── PAGE TRANSITIONS ── */
        @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        @keyframes slideInRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
        @keyframes slideInLeft{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}
        @keyframes scaleIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}

        /* ── TIMER OVERLAY ── */
        @keyframes timerPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}
        @keyframes timerSlideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
        @keyframes timerSlideDown{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(100%)}}
        @keyframes ringPulse{0%,100%{filter:drop-shadow(0 0 6px var(--c-accent))}50%{filter:drop-shadow(0 0 18px var(--c-accent))}}
        @keyframes urgentPulse{0%,100%{filter:drop-shadow(0 0 8px #C0392B)}50%{filter:drop-shadow(0 0 24px #C0392B)}}

        /* ── SET COMPLETION ── */
        @keyframes setDone{0%{transform:scale(1)}30%{transform:scale(1.18)}60%{transform:scale(.95)}100%{transform:scale(1)}}
        @keyframes checkPop{0%{opacity:0;transform:scale(0) rotate(-20deg)}50%{transform:scale(1.2) rotate(5deg)}100%{opacity:1;transform:scale(1) rotate(0)}}

        /* ── TAB BAR ── */
        @keyframes tabGlow{0%{box-shadow:0 0 0 0 var(--c-accent)}50%{box-shadow:0 0 12px 2px var(--c-accent)}100%{box-shadow:0 0 0 0 var(--c-accent)}}

        .fu{animation:fadeUp .35s cubic-bezier(.22,1,.36,1) forwards}
        .slide-r{animation:slideInRight .3s cubic-bezier(.22,1,.36,1) forwards}
        .slide-l{animation:slideInLeft .3s cubic-bezier(.22,1,.36,1) forwards}
        .scale-in{animation:scaleIn .25s cubic-bezier(.22,1,.36,1) forwards}
        .pulse{animation:pulse 2.5s infinite}

        .card{background:var(--c-card);border:1px solid var(--c-border);border-radius:4px;position:relative;transition:transform .15s ease, box-shadow .15s ease}
        .card::before{content:'';position:absolute;inset:0;border-radius:4px;background:repeating-linear-gradient(45deg,transparent,transparent 4px,rgba(128,128,128,.04) 4px,rgba(128,128,128,.04) 8px);pointer-events:none;}
        .card:active{transform:scale(.985)}

        .chip{padding:5px 12px;border-radius:2px;font-size:10px;letter-spacing:.1em;cursor:pointer;white-space:nowrap;border:1px solid var(--c-border);background:var(--c-card);color:var(--c-muted);font-family:'Share Tech Mono',monospace;transition:all .2s;text-transform:uppercase}
        .chip.on{background:var(--c-accent);color:var(--c-bg);border-color:var(--c-accent);font-weight:600}

        /* ── ENHANCED TAB BAR ── */
        .nav-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:${C.surface}F8;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid ${C.accent}33;z-index:100;padding:0 0 20px}
        .nav-bar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,${C.accent}66,transparent)}
        .nav-indicator{position:absolute;top:-1px;height:3px;background:var(--c-accent);border-radius:0 0 3px 3px;transition:left .3s cubic-bezier(.22,1,.36,1), width .3s cubic-bezier(.22,1,.36,1);box-shadow:0 2px 12px var(--c-accent)}
        .tab-btn{background:none;border:none;color:var(--c-muted);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:.08em;transition:all .25s cubic-bezier(.22,1,.36,1);padding:10px 0 4px;text-transform:uppercase;position:relative}
        .tab-btn.on{color:var(--c-accent);transform:translateY(-1px)}
        .tab-btn.on svg{filter:drop-shadow(0 2px 6px var(--c-accent))}
        .tab-btn svg{width:22px;height:22px;transition:filter .3s ease}

        .btn-accent{background:var(--c-accent);color:var(--c-bg);border:none;border-radius:2px;padding:14px 20px;font-family:'Oswald',sans-serif;font-size:15px;font-weight:600;letter-spacing:.12em;cursor:pointer;width:100%;transition:all .15s;text-transform:uppercase;border-bottom:3px solid var(--c-accent-dim)}
        .btn-accent:hover{opacity:.9}
        .btn-accent:active{transform:scale(.97);border-bottom-width:1px}

        .back{background:none;border:none;color:var(--c-muted);cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:.08em;display:flex;align-items:center;gap:6px;padding:0;transition:all .2s;text-transform:uppercase}
        .back:hover{color:var(--c-text);transform:translateX(-4px)}

        input{background:var(--c-card);border:1px solid var(--c-border);border-radius:2px;padding:12px 16px;width:100%;color:var(--c-text);font-family:'Share Tech Mono',monospace;font-size:16px;outline:none;letter-spacing:.06em;transition:border-color .2s, box-shadow .2s}
        input:focus{border-color:var(--c-accent);box-shadow:0 0 0 3px rgba(200,169,110,.12)}
        input::placeholder{color:var(--c-muted)}
        .ex-row{display:flex;align-items:center;gap:12px;padding:14px;border-radius:2px;cursor:pointer;border:1px solid var(--c-border);background:var(--c-card);transition:all .15s}
        .ex-row:hover{background:var(--c-faint)}
        .yt-btn{background:#8B0000;border:none;border-radius:2px;padding:5px 9px;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:'Share Tech Mono',monospace;font-size:9px;color:#F5F0E8;letter-spacing:.06em;font-weight:500;white-space:nowrap;transition:opacity .2s;flex-shrink:0;border-bottom:2px solid #600000;text-transform:uppercase}
        .yt-btn:hover{opacity:.85}
        .rank-badge{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:2px;background:var(--c-accent);color:var(--c-bg);font-family:'Oswald',sans-serif;font-size:13px;font-weight:700;flex-shrink:0}
        .tricolor{display:flex;height:3px;border-radius:0;overflow:hidden}
        .tricolor .b{flex:1;background:#1A3A6B}
        .tricolor .w{flex:1;background:#EDE8DC}
        .tricolor .r{flex:1;background:#C0392B}
        .section-label{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--c-muted);letter-spacing:.14em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
        .section-label::after{content:'';flex:1;height:1px;background:var(--c-border)}
        .military-header{font-family:'Oswald',sans-serif;letter-spacing:.06em;text-transform:uppercase;font-weight:700}

        /* ── TIMER (integrated in command bar) ── */
        .timer-ring{animation:ringPulse 2s infinite}
        .timer-ring.urgent{animation:urgentPulse 1s infinite}

        /* ── SET BUTTONS ── */
        .set-btn{flex:1;padding:12px 0;border-radius:2px;font-size:12px;font-family:inherit;cursor:pointer;transition:all .2s cubic-bezier(.22,1,.36,1);font-weight:400;position:relative;overflow:hidden}
        .set-btn.done{animation:setDone .4s cubic-bezier(.22,1,.36,1)}
        .set-btn:active{transform:scale(.92)}
      `}</style>

      {/* ── SYNC INDICATOR ── */}
      <SyncIndicator />

      {/* ── ONBOARDING ── */}
      {showOnboarding && <Onboarding onComplete={completeOnboarding} />}

      {/* ── HIIT TIMER FULLSCREEN ── */}
      {hiitTimerActive && (
        <HiitTimer config={hiitTimerActive} onCancel={() => setHiitTimerActive(null)}
          onComplete={(elapsed) => {
            logHiit({ date: new Date().toLocaleDateString("fr-FR", { day: "numeric", month: "short" }), ts: Date.now(), elapsed, label: hiitTimerActive.label });
            setHiitTimerActive(null);
          }} />
      )}

      <div style={{ minHeight: "calc(100vh - 72px)", overflowY: "auto", paddingBottom: 88 }}>
        <div key={transKey} className={slideClass}>
          {tab === "home"    && <Home setTab={switchTab} goToSession={goToSession} weights={weights} hiitLog={hiitLog} setHiitLog={logHiit} sessionsThisWeek={sessionsThisWeek} sessionLog={sessionLog} setHiitTimerActive={setHiitTimerActive} charges={charges} journal={journal} setJournal={setJournal} />}
          {tab === "program" && !sessionView && !sessionReport && <ProgramOverview setSessionView={setSessionView} />}
          {tab === "program" && sessionView && !sessionReport  && <SessionDetail session={sessionView} charges={charges} logCharge={logCharge} onBack={() => setSessionView(null)} onFinish={(report) => { setSessionReport(report); setSessionView(null); }} />}
          {tab === "program" && sessionReport && <SessionReportScreen report={sessionReport} onClose={() => { logSession({ ts: Date.now(), label: sessionReport.session.label }); setSessionReport(null); }} />}
          {tab === "library" && !exDetail   && <Library filters={{ muscleF, setMuscleF, typeF, setTypeF, equipF, setEquipF, search, setSearch }} onSelect={setExDetail} customExercises={customExercises} addExercise={addExercise} deleteExercise={deleteExercise} />}
          {tab === "library" && exDetail    && <ExDetail ex={exDetail} onBack={() => setExDetail(null)} />}
          {tab === "stats"   && <Stats perfData={computedPerfData} volumeData={computedVolumeData} radarData={computedRadarData} charges={charges} weights={weights} logWeight={logWeight} metric={metric} setMetric={setMetric} />}
          {tab === "charges" && <Charges charges={charges} logCharge={logCharge} exerciseGoals={exerciseGoals} setExerciseGoals={setExerciseGoals} />}
          {tab === "nutrition" && <Nutrition measurements={measurements} setMeasurements={logMeasurements} weights={weights} resetAllData={resetAllData} />}
        </div>
      </div>

      {/* ── ENHANCED NAV BAR ── */}
      <div className="nav-bar">
        <div className="nav-indicator" style={{ left: `${(tabIdx / 6) * 100}%`, width: `${100 / 6}%` }} />
        <div style={{ display: "grid", gridTemplateColumns: "repeat(6,1fr)" }}>
          {[
            { id: "home",      lbl: "ACCUEIL",  d: "M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" },
            { id: "program",   lbl: "PROGRAMME",    d: "M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" },
            { id: "charges",   lbl: "CHARGES",  d: "M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3" },
            { id: "library",   lbl: "EXOS",     d: "M4 6h16M4 10h16M4 14h16M4 18h16" },
            { id: "stats",     lbl: "STATS",    d: "M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" },
            { id: "nutrition", lbl: "NUTRITION",    d: "M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" },
          ].map(t => (
            <button key={t.id} className={`tab-btn ${tab === t.id ? "on" : ""}`} onClick={() => switchTab(t.id)}>
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={tab === t.id ? 2 : 1.5} d={t.d} /></svg>
              {t.lbl}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ── HOME ── */
function Home({ setTab, goToSession, weights, hiitLog, setHiitLog, sessionsThisWeek, sessionLog, setHiitTimerActive, charges, journal, setJournal }) {
  const currentWeight = weights?.[0]?.kg ?? 78.5;
  const todaySession = getTodaySession();
  const hiitToday = isHiitDay();
  const currentWeek = getCurrentWeek();
  const todayStr = new Date().toLocaleDateString("fr-FR", { day: "numeric", month: "short" });
  const hiitDoneToday = hiitLog.some(h => h.date === todayStr);

  const dayNames = ["DIM", "LUN", "MAR", "MER", "JEU", "VEN", "SAM"];
  const todayDay = dayNames[new Date().getDay()];

  const logHiit = () => {
    if (hiitDoneToday) return;
    setHiitLog(prev => [{ date: todayStr, ts: Date.now() }, ...prev].slice(0, 30));
  };

  return (
    <div className="fu" style={{ padding: "0 20px" }}>
      {/* Header with French flag background */}
      <div style={{ paddingTop: 48, paddingBottom: 20, position: "relative", overflow: "hidden" }}>
        {/* French flag background */}
        <div style={{ position: "absolute", inset: 0, display: "flex", pointerEvents: "none", opacity: 0.06 }}>
          <div style={{ flex: 1, background: "#002395" }} />
          <div style={{ flex: 1, background: "#FFFFFF" }} />
          <div style={{ flex: 1, background: "#ED2939" }} />
        </div>
        <div style={{ position: "relative", zIndex: 1 }}>
          <div className="tricolor" style={{ marginBottom: 16 }} />
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
            <div>
              <div style={{ fontFamily: "'Share Tech Mono'", fontSize: 10, color: C.muted, letterSpacing: ".16em", marginBottom: 6 }}>
                {new Date().toLocaleDateString("fr-FR", { weekday: "long", day: "numeric", month: "long" }).toUpperCase()}
              </div>
              <div className="military-header" style={{ fontSize: 40, color: C.text, lineHeight: .95 }}>
                PILOTE,<br /><span style={{ color: C.accent }}>EN PISTE.</span>
              </div>
            </div>
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
              <div style={{ fontSize: 36 }}>🏍️</div>
              <div style={{ fontFamily: "'Share Tech Mono'", fontSize: 8, color: C.muted, letterSpacing: ".1em" }}>RIDE & LIFT</div>
            </div>
          </div>
          <div style={{ marginTop: 10, fontFamily: "'Share Tech Mono'", fontSize: 11, color: C.muted }}>
            SEMAINE {currentWeek} · CONSTRUCTION HAUT DU CORPS · <span style={{ color: C.accent }}>{currentWeight} KG · OBJECTIF JUILLET 🏖️</span> ▶
          </div>
          <div className="tricolor" style={{ marginTop: 14 }} />
        </div>
      </div>

      {/* Mission du jour */}
      {todaySession ? (
        <div onClick={() => goToSession(todaySession)}
          style={{ background: `linear-gradient(135deg,${C.accent}18,${C.accent}05)`, border: `1px solid ${C.accent}55`, borderRadius: 4, padding: 20, marginBottom: 16, cursor: "pointer", borderLeft: `4px solid ${C.accent}` }}
          className="pulse">
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
            <div>
              <div className="section-label" style={{ marginBottom: 6, color: C.accent }}>◈ SORTIE DU JOUR · {todayDay}</div>
